<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hanoi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="winter">
  <main class="layout">
    <div class="site-title">The Hanoi Method</div>

    <div class="theme-control">
      <label for="theme-select">Palette</label>
      <select id="theme-select">
        <option value="spring">Springtime</option>
        <option value="summer">Summer</option>
        <option value="winter" selected>Winter</option>
        <option value="fall">Fall</option>
      </select>
    </div>

    <section class="prompt-block">
      <h1 id="exercise-title">Exercise</h1>
      <p id="exercise-prompt">Loading...</p>
      <div class="prompt-actions">
        <button id="new-exercise" type="button">New exercise</button>
      </div>
    </section>

    <div class="empty"></div>

    <section class="writing-block">
      <label for="writing" class="label">Write</label>

      <form id="writing-form">
        <textarea id="writing" name="writing" placeholder="Start writing here..."></textarea>

        <div class="writing-meta">
          <div id="word-count" class="word-count">0 / 120 words</div>
        </div>

        <div class="actions">
          <button id="submit-button" type="submit">Submit</button>
        </div>
      </form>
    </section>

    <aside class="review-block">
      <div id="feedback-window" class="feedback-window">
        <p><strong>Feedback</strong></p>
        <p>Feedback will appear here.</p>
      </div>
    </aside>
  </main>

  <script>
    const form = document.getElementById("writing-form");
    const writing = document.getElementById("writing");
    const feedbackWindow = document.getElementById("feedback-window");
    const themeSelect = document.getElementById("theme-select");
    const exerciseTitle = document.getElementById("exercise-title");
    const exercisePrompt = document.getElementById("exercise-prompt");
    const newExerciseButton = document.getElementById("new-exercise");
    const wordCountDisplay = document.getElementById("word-count");
    const submitButton = document.getElementById("submit-button");

    const WORD_LIMIT = 120;

    let currentExercise = {
      title: "Exercise",
      prompt: ""
    };

    function countWords(text) {
      const trimmed = text.trim();
      if (!trimmed) return 0;
      return trimmed.split(/\s+/).length;
    }

    function updateWordCount() {
      const count = countWords(writing.value);
      wordCountDisplay.textContent = `${count} / ${WORD_LIMIT} words`;

      if (count > WORD_LIMIT) {
        wordCountDisplay.classList.add("over-limit");
        submitButton.disabled = true;
      } else {
        wordCountDisplay.classList.remove("over-limit");
        submitButton.disabled = false;
      }
    }

    const savedTheme = localStorage.getItem("theme") || "winter";
    document.body.setAttribute("data-theme", savedTheme);
    themeSelect.value = savedTheme;

    themeSelect.addEventListener("change", function () {
      const theme = themeSelect.value;
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    });

    async function loadExercise() {
      exerciseTitle.textContent = "Exercise";
      exercisePrompt.textContent = "Loading...";

      try {
        const response = await fetch("/exercise");

        if (!response.ok) {
          throw new Error("exercise request failed");
        }

        const data = await response.json();

        currentExercise = data;
        exerciseTitle.textContent = data.title || "Exercise";
        exercisePrompt.textContent = data.prompt || "No prompt received.";
      } catch (error) {
        exerciseTitle.textContent = "Exercise";
        exercisePrompt.textContent = "Could not load exercise.";
        console.error(error);
      }

      feedbackWindow.innerHTML = `
        <p><strong>Feedback</strong></p>
        <p>Feedback will appear here.</p>
      `;
    }

    newExerciseButton.addEventListener("click", async function () {
      await loadExercise();
      writing.value = "";
      updateWordCount();
      writing.focus();
    });

    writing.addEventListener("input", updateWordCount);

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const text = writing.value;
      const count = countWords(text);

      if (count > WORD_LIMIT) {
        feedbackWindow.innerHTML = `
          <p><strong>Feedback</strong></p>
          <p>Over the word limit.</p>
        `;
        return;
      }

      feedbackWindow.innerHTML = `
        <p><strong>Feedback</strong></p>
        <p>Reviewing...</p>
      `;

      try {
        const response = await fetch("/review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text,
            prompt: currentExercise.prompt
          })
        });

        const data = await response.json();

        feedbackWindow.innerHTML = `
          <p><strong>Feedback</strong></p>
          <p><strong>Word count:</strong> ${data.wordCount}</p>
          <ul>
            ${data.notes.map(note => `<li>${note}</li>`).join("")}
          </ul>
          <p><strong>Next pass:</strong> ${data.next}</p>
        `;
      } catch (error) {
        feedbackWindow.innerHTML = `
          <p><strong>Feedback</strong></p>
          <p>Request failed.</p>
        `;
        console.error(error);
      }
    });

    loadExercise();
    updateWordCount();
  </script>
</body>
</html>
