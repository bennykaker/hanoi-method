<h1>The Hanoi Method</h1>

<p>The Hanoi Method focuses on the process, not the result.</p>

<h2>Principles</h2>

<ul>
  <li>Focus on the process.</li>
  <li>Do the work.</li>
  <li>Don’t look back.</li>
</ul>

<p>Write → Revise → Next.</p>
