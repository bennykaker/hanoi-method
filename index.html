<h1>The Hanoi Method</h1>

<p>
The Hanoi Method focuses on the process, not the result.
</p>

<h2>Principles</h2>

<ul>
  <li>We focus on the process.</li>
  <li>We do the work.</li>
  <li>We don’t look back.</li>
</ul>

<p>
Write → Revise → Next.
</p>
